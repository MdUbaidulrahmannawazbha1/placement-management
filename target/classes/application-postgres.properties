spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Use your actual database name if different, for example:
# spring.datasource.url=jdbc:postgresql://localhost:5432/revatable

# New rows need a database-generated sid. If INSERT fails on sid, make the column
# SERIAL/IDENTITY in PostgreSQL so the DB assigns sid.
